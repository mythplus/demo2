# ============================================
# Mem0 Dashboard 配置文件
# 修改此文件后，前端"系统设置"页面刷新即可同步显示最新配置
# 注意：修改 LLM/Embedder/向量数据库/图数据库 配置后需要重启后端服务才能生效于实际业务
# 支持环境变量替换：使用 ${ENV_VAR_NAME} 格式引用环境变量
# ============================================

# LLM 大语言模型配置
llm:
  provider: "ollama"
  config:
    model: "qwen2.5:7b"
    ollama_base_url: "http://9.134.231.238:11434"
    temperature: 0.1

# Embedder 嵌入模型配置
embedder:
  provider: "ollama"
  config:
    model: "nomic-embed-text"
    ollama_base_url: "http://9.134.231.238:11434"

# 向量数据库配置
vector_store:
  provider: "qdrant"
  config:
    collection_name: "mem0"
    embedding_model_dims: 768
    on_disk: true

# 图数据库配置
graph_store:
  provider: "neo4j"
  config:
    url: "bolt://9.134.231.238:7687"
    username: "neo4j"
    password: "mem0_neo4j_2024"

# 安全配置
security:
  # API Key 认证（为空则不启用认证，建议生产环境必须设置）
  api_key: ""
  # CORS 允许的来源（逗号分隔，* 表示允许所有）
  cors_origins: "http://localhost:3000,http://127.0.0.1:3000"
  # 速率限制（每分钟最大请求数，0 表示不限制）
  rate_limit: 60

# 版本号
version: "v1.1"
