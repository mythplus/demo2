# ============================================
# Mem0 Dashboard 生产部署 Compose 文件
# 与 docker-compose.yml 的区别：
#   - 后端/前端使用远程镜像（image:），不再本地构建
#   - 默认从 CSIGHUB 拉取 :latest
#   - 可通过环境变量 BACKEND_IMAGE_TAG / FRONTEND_IMAGE_TAG 指定版本
#
# 用法（在服务器上）：
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
# ============================================

services:
  backend:
    image: "${IMAGE_REGISTRY:-csighub.tencentyun.com/your-team}/mem0-dashboard-backend:${BACKEND_IMAGE_TAG:-latest}"
    container_name: mem0-backend
    restart: unless-stopped
    environment:
      - MEM0_ENV=production
      - MEM0_PORT=8080
      - MEM0_WORKERS=${MEM0_WORKERS:-1}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - NEO4J_URL=${NEO4J_URL:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-mem0_neo4j_2024}
      - MEM0_API_KEY=${MEM0_API_KEY:-}
    volumes:
      - qdrant_data:/app/qdrant_data
      - access_logs:/app/data
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - mem0-network
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    image: "${IMAGE_REGISTRY:-csighub.tencentyun.com/your-team}/mem0-dashboard-frontend:${FRONTEND_IMAGE_TAG:-latest}"
    container_name: mem0-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_MEM0_API_URL=
    networks:
      - mem0-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    container_name: mem0-nginx
    restart: unless-stopped
    environment:
      - MEM0_API_KEY=${MEM0_API_KEY:-}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - mem0-network
    depends_on:
      - frontend
      - backend

  neo4j:
    image: neo4j:5.15-community
    container_name: mem0-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-mem0_neo4j_2024}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=128m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - mem0-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  qdrant_data:
    driver: local
  access_logs:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  certbot_webroot:
    driver: local

networks:
  mem0-network:
    driver: bridge
