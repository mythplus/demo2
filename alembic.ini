# Alembic configuration for database migrations.
# Common commands:
#   alembic revision --autogenerate -m "add xxx column"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic current
#   alembic history
# See alembic/README.md for more details (Chinese).

[alembic]
# Migration script directory.
script_location = alembic

# Script file naming template.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Align timezone with business logs (UTC).
timezone = UTC

# Max slug length.
truncate_slug_length = 40

# sqlalchemy.url is injected dynamically by alembic/env.py from
# server.config.DATABASE_URL, so we do NOT duplicate the DSN here.
sqlalchemy.url =

[post_write_hooks]
# Reserved hooks (e.g. black formatter).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

