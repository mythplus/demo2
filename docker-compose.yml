# ============================================
# Mem0 Dashboard Docker Compose 一键部署
#
# 使用方法：
#   1. 复制 .env.example 为 .env 并填入实际值
#   2. 复制 config.yaml.example 为 config.yaml 并按需修改
#   3. 生成 SSL 证书：cd nginx/ssl && bash generate-cert.sh
#   4. 启动：docker-compose up -d
#   5. 访问：https://localhost
# ============================================

version: "3.8"

services:
  # ---- 后端 API 服务 ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mem0-backend
    restart: unless-stopped
    environment:
      - MEM0_ENV=production
      - MEM0_PORT=8080
      - MEM0_WORKERS=${MEM0_WORKERS:-2}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://vllm:8000/v1}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      - VLLM_API_KEY=${VLLM_API_KEY:-vllm-api-key}
      - NEO4J_URL=${NEO4J_URL:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-mem0_neo4j_2024}
      - MEM0_API_KEY=${MEM0_API_KEY:-}
    volumes:
      # 持久化数据：Qdrant 向量数据 + SQLite 日志
      - qdrant_data:/app/qdrant_data
      - access_logs:/app/data
      # 配置文件挂载（宿主机 config.yaml → 容器内）
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - mem0-network
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ---- 前端 Dashboard ----
  frontend:
    build:
      context: ./mem0-dashboard
      dockerfile: Dockerfile
    container_name: mem0-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_MEM0_API_URL=http://backend:8080
      - NEXT_PUBLIC_MEM0_API_KEY=${MEM0_API_KEY:-}
    networks:
      - mem0-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ---- Nginx 反向代理（HTTPS 终止） ----
  nginx:
    image: nginx:1.25-alpine
    container_name: mem0-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - mem0-network
    depends_on:
      - frontend
      - backend

  # ---- vLLM 推理服务 ----
  vllm:
    image: vllm/vllm-openai:latest
    container_name: mem0-vllm
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - VLLM_API_KEY=${VLLM_API_KEY:-vllm-api-key}
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      --host 0.0.0.0
      --port 8000
      --max-model-len 8192
      --gpu-memory-utilization 0.85
      --enable-auto-tool-choice
      --tool-call-parser hermes
    ports:
      - "${VLLM_PORT:-8000}:8000"
    networks:
      - mem0-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  # ---- Neo4j 图数据库 ----
  neo4j:
    image: neo4j:5.15-community
    container_name: mem0-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-mem0_neo4j_2024}
      - NEO4J_PLUGINS=["apoc"]
      # 限制内存使用
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=128m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - mem0-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

# ---- 数据卷 ----
volumes:
  qdrant_data:
    driver: local
  access_logs:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  certbot_webroot:
    driver: local

# ---- 网络 ----
networks:
  mem0-network:
    driver: bridge
